<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WSP ACH Migration Assistant - No API</title>
<style>
:root{--bg:#0f1117;--surface:#181c27;--elev:#1e2333;--input:#141720;--accent:#2dd4a0;--text:#e8eaf0;--muted:#8a90a4;--border:rgba(255,255,255,.09);--bot:#1e2a26;--user:#1a2840}*{box-sizing:border-box}html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}body{display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(45,212,160,.08),transparent)}#app{width:100%;max-width:820px;height:calc(100vh - 40px);max-height:880px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.45)}.header{padding:18px 24px;border-bottom:1px solid var(--border);background:var(--elev);display:flex;gap:14px;align-items:center}.icon{width:38px;height:38px;border-radius:10px;background:rgba(45,212,160,.16);border:1px solid rgba(45,212,160,.25);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:bold}.header h1{font-size:16px;margin:0 0 2px;font-weight:600}.header p{font-size:12px;margin:0;color:var(--muted)}#messages{flex:1;overflow:auto;padding:24px;display:flex;flex-direction:column;gap:16px}.msg{display:flex;gap:10px;max-width:90%;align-items:flex-end}.msg.user{align-self:flex-end;flex-direction:row-reverse}.msg.bot{align-self:flex-start}.avatar{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}.bot .avatar{background:rgba(45,212,160,.16);border:1px solid rgba(45,212,160,.25);color:var(--accent)}.user .avatar{background:rgba(99,148,255,.15);border:1px solid rgba(99,148,255,.25);color:#80a7ff}.bubble{padding:12px 16px;border-radius:20px;line-height:1.6;font-size:14px;white-space:pre-wrap;word-break:break-word}.bot .bubble{background:var(--bot);border:1px solid var(--border);border-bottom-left-radius:4px}.user .bubble{background:var(--user);border:1px solid rgba(99,148,255,.2);border-bottom-right-radius:4px}#chips{padding:0 24px 16px;display:flex;flex-wrap:wrap;gap:8px}.chip{padding:8px 14px;border-radius:999px;border:1px solid var(--border);background:var(--elev);color:var(--muted);cursor:pointer;font-size:13px}.chip:hover{border-color:rgba(45,212,160,.35);color:var(--accent)}.input{padding:16px 20px;border-top:1px solid var(--border);background:var(--elev);display:flex;gap:10px;align-items:flex-end}#user-input{flex:1;min-height:44px;max-height:120px;resize:none;border-radius:10px;border:1px solid var(--border);background:var(--input);color:var(--text);font:14px Arial,Helvetica,sans-serif;padding:12px 14px;outline:none;line-height:1.45}#user-input:focus{border-color:rgba(45,212,160,.35)}#send-btn{width:44px;height:44px;border:0;border-radius:10px;background:var(--accent);color:#061a13;font-weight:bold;cursor:pointer}.footer{padding:10px 24px;border-top:1px solid var(--border);font-size:11px;color:#666;display:flex;justify-content:space-between}.clear{background:none;border:none;color:#777;cursor:pointer}@media(max-width:600px){body{padding:0}#app{height:100vh;max-height:none;border-radius:0;border:0}.header,.input{padding:14px 16px}#messages{padding:16px}#chips{padding:0 16px 12px}.msg{max-width:96%}}
</style>
</head>
<body>
<div id="app">
  <div class="header"><div class="icon">✦</div><div><h1>ACH Migration Assistant</h1><p>No API key required · Local knowledge-base responses</p></div></div>
  <div id="messages"></div>
  <div id="chips">
    <button class="chip" type="button">What are our current return rates?</button>
    <button class="chip" type="button">Most common return code?</button>
    <button class="chip" type="button">How does failed payment recovery work?</button>
    <button class="chip" type="button">How much have we failed to collect?</button>
    <button class="chip" type="button">Active students with payment issues?</button>
    <button class="chip" type="button">What happens if we do nothing?</button>
  </div>
  <div class="input"><textarea id="user-input" rows="1" placeholder="Ask about the ACH migration or returns data…"></textarea><button id="send-btn" type="button">Send</button></div>
  <div class="footer"><span>Powered locally · Knowledge base: WSP internal</span><button class="clear" id="clear-btn" type="button">Clear chat</button></div>
</div>
<script>
(function(){
'use strict';
var KB = [
{keys:['return rate','return rates','nacha','threshold','current'],answer:'Current ACH return rates from the knowledge base:\n\n• Overall Return Rate: 18.87% vs. NACHA threshold of 15% — exceeds threshold\n• Last 30 Days: 30.95% vs. 15% — severely exceeds threshold\n• Unauthorized Returns: approximately 5.88% vs. 0.5% — severely exceeds threshold\n• Administrative Returns: approximately 8.82% vs. 3% — exceeds threshold\n\nFor 1/4/24–5/12/26, there were 832 Authorize.net ACH transactions and 157 returned transactions.'},
{keys:['most common','largest','r01','insufficient funds','return code'],answer:'The most common return code is R01 — Insufficient Funds. All-time, R01 accounts for 111 of 178 returns, or 62.36% of all returns.\n\nOther notable return codes include R03 No Account/Unable to Locate at 23 returns, R29 Corporate Customer Advises Not Authorized at 14 returns, and R02 Account Closed at 13 returns.'},
{keys:['failed payment','recovery','past due','retry','dunning','subscription fails','payment fail'],answer:'When an ACH payment fails in HubSpot Payments:\n\n1. The customer automatically receives an email with a link to update payment information.\n2. Subscription Status changes to “past due” and Payment Status changes to “failed.”\n3. HubSpot does not auto-retry on a fixed dunning schedule.\n4. HubSpot listens for payment information updates and fires an authorization request once banking information is updated.\n5. Past-due balances are immediately charged to the updated payment method.\n6. Status remains unpaid/processing until settlement, typically 3–5 days, then returns to active/successful.\n7. Staff can manually retry or send a payment update email from the Subscriptions card.'},
{keys:['failed to collect','uncollected','how much','shortcomings','money'],answer:'The knowledge base states that WSP has failed to collect over $283,000 due to Authorize.net ACH shortcomings.\n\nIt also notes that approximately 15–18 returned transactions totaling about $34,700 have no corresponding HubSpot contact record, making them invisible in the CRM.'},
{keys:['active','urgent','students','payment issues','unresolved','upcoming','grading'],answer:'Active or urgent unresolved payment cases listed in the knowledge base include:\n\n• t.bienemy@yahoo.com — Spring PE and Spring FPA failures, both Active/Upcoming\n• dr.chaudharyniket@gmail.com — Spring RDI R01 and Spring PE R29 chargeback\n• lconyers@conyerscapitalmanagement.org — Spring RDI, 3 separate failures with upcoming payments\n• sappmaggiel380@gmail.com — Spring RDI, R16 Account Frozen\n• keoamnart54@gmail.com — Spring RE, R03 No Account\n• roxysurfbabee@icloud.com — Winter RE, 5/5 payments failed via R29 chargeback\n• marydwar@gmail.com — Fall AIFB, Active/2nd Attempt\n• nathanberry@live.com — Winter FPA and PE, Active/Grading\n• trellb969@gmail.com — Winter PE, R16 Account Frozen, Active/Grading\n• kirk12475@gmail.com — Spring RDI, R10 unauthorized, 4 more payments scheduled\n• lmorr04072014@gmail.com — Spring PE, R01, Active/Upcoming'},
{keys:['do nothing','nothing happens','risk','processor','reserve','termination'],answer:'If WSP does nothing, the knowledge base identifies these risks:\n\n• Processor reviews\n• Reserve requirements\n• Funding delays\n• ACH volume restrictions\n• Mandatory remediation plans\n• ACH processing termination\n• Sponsoring bank escalation\n\nThe risk increases as ACH return rates remain elevated above NACHA thresholds.'},
{keys:['why migrate','migrate','migration rationale','hubspot payments','why hubspot'],answer:'The migration rationale is that current ACH return rates are above NACHA-recommended thresholds, creating compliance, operational, and processor risk.\n\nHubSpot Payments improves ACH visibility, monitoring, reporting, failed payment workflows, customer communication, and payment recovery while reducing manual administrative burden.'},
{keys:['replace all','samcart','credit card','card','all payment'],answer:'No — the proposal is not to replace all payment processing. The plan is to continue using SamCart for credit card transactions and use HubSpot Payments exclusively for ACH transactions.\n\nSamCart transactions sync to HubSpot as Deals. With HubSpot Payments, the first ACH transaction becomes a Deal, and subsequent transactions appear as individual payments within a Subscription object.'},
{keys:['authorize.net','authorize','continue using authorize','why not continue'],answer:'Authorize.net can continue only with significant additional controls. The knowledge base says it requires dedicated ACH monitoring, manual reconciliation, external reporting processes, and additional compliance oversight.\n\nIt also lacks automatic notification when an eCheck is returned for insufficient funds, meaning staff must check manually.'},
{keys:['cost','fees','fee','ach cost','hubspot cost'],answer:'HubSpot ACH may be slightly more expensive for smaller transactions, but for larger transactions ACH fee caps become advantageous, gateway fees are eliminated, and operational costs decrease.\n\nThe main savings are operational rather than purely transactional.'},
{keys:['authorization','banking information','nacha compliant','compliance','stripe'],answer:'HubSpot captures customer ACH authorization during checkout. ACH payments are hosted by Stripe, which provides documentation of customer authorization for NACHA compliance.\n\nCustomer banking information is not stored by WSP. It is securely collected and stored by Stripe, and staff do not have direct access to customer bank account details.'},
{keys:['dispute','chargeback','r07','r10','r29','unauthorized'],answer:'ACH dispute and chargeback notes:\n\n• HubSpot surfaces dispute events within payment records.\n• Key unauthorized return codes are R07, R10, and R29.\n• These count toward NACHA unauthorized return thresholds and should be reviewed immediately.\n• ACH disputes cannot be challenged and are lost by default.\n• Recommended setup: designate a leadership owner for disputes and enable payment dispute email notifications in HubSpot.'},
{keys:['refund','refunds'],answer:'Refunds can be issued directly through HubSpot. Once the Enrollment Team has the proper permissions, they can locate the payment record and issue a partial or full refund. The activity is automatically recorded in HubSpot.'},
{keys:['existing ach customers','existing customers','legacy','transition','sunset'],answer:'Existing ACH customers can remain on current arrangements during the transition. The recommended approach is to move new ACH originations to HubSpot first, validate the process, and then gradually sunset Authorize.net ACH processing after historical transactions have settled.'},
{keys:['statistics','overall statistics','transactions','832','1301'],answer:'Key transaction statistics from the knowledge base:\n\n1/4/24–5/12/26:\n• Total Authorize.net ACH Transactions: 832\n• Returned Transactions: 157, or 18.87%\n• Returned Items: 139, or 16.71%\n• Chargebacks: 18, or 2.16%\n\nAll-time:\n• Total Transactions: 1,301\n• Returned: 178, or 13.68%\n• Returned Items: 157, or 12.07%\n• Chargebacks: 21, or 1.61%'},
{keys:['program','wharton','columbia','returns by program'],answer:'Returns by program in the knowledge base:\n\nWharton: 135 recorded returns, with the largest yearly count in 2025 at 63 returns.\n\nColumbia: 16 recorded returns, including 9 in 2025 Summer AIFB, 6 in 2025 Fall AIFB, and 1 in 2026 Spring AIFB.'},
{keys:['no hubspot','missing hubspot','hubspot record','invisible'],answer:'The knowledge base identifies approximately 15–18 transactions totaling about $34,700 that have returns but no corresponding HubSpot contact record. These are described as invisible in the CRM.'}
];
var fallback = 'I could not find a precise answer in the local knowledge base for that question. Try asking about return rates, NACHA thresholds, HubSpot Payments, failed payments, disputes/chargebacks, Authorize.net, refunds, SamCart, active payment issues, or migration risks.';
var messages = document.getElementById('messages');
var input = document.getElementById('user-input');
var sendBtn = document.getElementById('send-btn');
var clearBtn = document.getElementById('clear-btn');
var chips = document.getElementById('chips');
function addMsg(role,text){
  var wrap=document.createElement('div'); wrap.className='msg '+role;
  var av=document.createElement('div'); av.className='avatar'; av.textContent=role==='bot'?'✦':'↑';
  var bub=document.createElement('div'); bub.className='bubble'; bub.textContent=text;
  wrap.appendChild(av); wrap.appendChild(bub); messages.appendChild(wrap); messages.scrollTop=messages.scrollHeight;
}
function scoreAnswer(q,item){
  var query=q.toLowerCase(); var score=0;
  item.keys.forEach(function(k){ if(query.indexOf(k)>=0){ score += k.length>8 ? 3 : 2; }});
  var words=query.split(/[^a-z0-9]+/).filter(function(w){return w.length>3});
  item.keys.forEach(function(k){ words.forEach(function(w){ if(k.indexOf(w)>=0 || w.indexOf(k)>=0) score += 1; }); });
  return score;
}
function answer(q){
  var best=null,bestScore=0;
  KB.forEach(function(item){ var s=scoreAnswer(q,item); if(s>bestScore){best=item;bestScore=s;} });
  return bestScore>0 ? best.answer : fallback;
}
function sendText(text){
  var q=(text||'').trim(); if(!q) return;
  addMsg('user',q); if(chips) chips.style.display='none';
  window.setTimeout(function(){ addMsg('bot', answer(q)); }, 120);
}
function send(){ sendText(input.value); input.value=''; input.style.height='44px'; input.focus(); }
sendBtn.addEventListener('click', send);
input.addEventListener('keydown', function(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }});
input.addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px'; });
Array.prototype.forEach.call(document.querySelectorAll('.chip'), function(btn){ btn.addEventListener('click', function(){ sendText(btn.textContent); }); });
clearBtn.addEventListener('click', function(){ messages.innerHTML=''; if(chips) chips.style.display='flex'; addMsg('bot', intro); input.focus(); });
var intro = 'Hi — I’m the WSP ACH Migration Assistant. This no-API version answers from the embedded ACH migration knowledge base using local keyword matching. Ask about return rates, NACHA thresholds, HubSpot Payments, Authorize.net, failed payment recovery, disputes, refunds, or active payment issues.';
addMsg('bot', intro);
input.focus();
})();
</script>
</body>
</html>
